<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White background padding -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- H letterform with balance scale top - filled black -->
  <!-- Left vertical bar -->
  <rect x="55" y="70" width="18" height="90" rx="4" fill="black"/>
  <!-- Right vertical bar -->
  <rect x="127" y="70" width="18" height="90" rx="4" fill="black"/>
  <!-- Middle crossbar -->
  <rect x="55" y="105" width="90" height="16" rx="3" fill="black"/>
  
  <!-- Balance scale top bar -->
  <rect x="35" y="42" width="130" height="14" rx="4" fill="black"/>
  <!-- Center pivot circle -->
  <circle cx="100" cy="49" r="10" fill="black"/>
  <!-- Left pan support -->
  <rect x="42" y="42" width="10" height="22" rx="2" fill="black"/>
  <!-- Right pan support -->
  <rect x="148" y="42" width="10" height="22" rx="2" fill="black"/>
</svg>
